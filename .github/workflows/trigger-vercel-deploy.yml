name: trigger-vercel-deploy
on:
  push:
    branches: [claude/trigger-deploy]
jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call Vercel Deploy Hook (verbose, both methods)
        run: |
          set -uo pipefail
          echo "=== POST ==="
          post=$(curl -sS -X POST -i \
            "https://api.vercel.com/v1/integrations/deploy/prj_pF96W3Etp9dqURwKZaaBhoMKwvik/vDuEDdLX1E" || true)
          echo "$post"
          echo "=== GET ==="
          get=$(curl -sS -i \
            "https://api.vercel.com/v1/integrations/deploy/prj_pF96W3Etp9dqURwKZaaBhoMKwvik/vDuEDdLX1E" || true)
          echo "$get"
