name: trigger-vercel-deploy
on:
  push:
    branches: [claude/trigger-deploy]
jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call Vercel Deploy Hook
        run: |
          set -euo pipefail
          response=$(curl -sS -X POST \
            "https://api.vercel.com/v1/integrations/deploy/prj_pF96W3Etp9dqURwKZaaBhoMKwvik/vDuEDdLX1E" \
            -w "\nHTTP_STATUS=%{http_code}\n")
          echo "$response"
          echo "$response" | grep -q "HTTP_STATUS=20" || exit 1
