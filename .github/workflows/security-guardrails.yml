name: Security Guardrails

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"

jobs:
  static-security:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security sink scan
        run: npm run security:sinks

      - name: Root dependency audit (high+)
        run: npm audit --omit=dev --audit-level=high

      - name: Hero dependency audit (high+)
        run: npm --prefix w2b-hero audit --omit=dev --audit-level=high

  headers-smoke:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: HTTP security smoke
        env:
          SECURITY_BASE_URL: ${{ vars.SECURITY_BASE_URL || 'https://where2beach.com' }}
        run: npm run security:smoke

  supabase-advisors:
    if: github.event_name != 'pull_request' && (secrets.SUPABASE_DB_URL_CI != '' || secrets.SUPABASE_DB_URL != '' || (secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_PROJECT_REF != '' && secrets.SUPABASE_DB_PASSWORD != ''))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Supabase advisors guardrail
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_CI != '' && secrets.SUPABASE_DB_URL_CI || secrets.SUPABASE_DB_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ADVISORS_ALLOWLIST: auth_leaked_password_protection
        run: npm run security:advisors
