<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codice di verifica – Where2Beach</title>
</head>
<body style="margin:0;padding:0;background-color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f172a;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <img src="https://where2beach.com/icons/icon-192.png" width="56" height="56"
                alt="Where2Beach" style="border-radius:14px;display:block;" />
            </td>
          </tr>
          <tr>
            <td style="background-color:#1e293b;border-radius:20px;padding:40px 36px;border:1px solid rgba(255,255,255,0.08);">
              <p style="margin:0 0 8px 0;font-size:22px;font-weight:700;color:#f1f5f9;line-height:1.3;">
                Codice di verifica
              </p>
              <p style="margin:0 0 28px 0;font-size:15px;color:#94a3b8;line-height:1.6;">
                Inserisci questo codice nell'app per completare la verifica.
              </p>
              <table cellpadding="0" cellspacing="0" style="margin-bottom:28px;">
                <tr>
                  <td style="background:#0f172a;border:1px solid rgba(125,211,252,0.3);border-radius:12px;padding:14px 28px;">
                    <span style="font-size:32px;font-weight:700;color:#7dd3fc;letter-spacing:0.15em;">{{ .Token }}</span>
                  </td>
                </tr>
              </table>
              <p style="margin:0;font-size:13px;color:#64748b;line-height:1.6;">
                Il codice è valido per <strong style="color:#94a3b8;">10 minuti</strong>.
                Se non hai richiesto questo codice, puoi ignorare questa email.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-size:12px;color:#475569;">
                © Where2Beach · <a href="https://where2beach.com" style="color:#475569;text-decoration:none;">where2beach.com</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
